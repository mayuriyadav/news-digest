spring.application.name=News Digest Platform

spring.datasource.url=jdbc:mysql://localhost:3306/news_digest_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.pool-name=NewsDigestHikariPool
spring.datasource.hikari.auto-commit=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

# NewsAPI.org ? get free key at https://newsapi.org/register
newsapi.key=${NEWS_API_KEY:0979fb3c999641c59b2532302a8bc1f8}
newsapi.base-url=https://newsapi.org/v2
newsapi.default-page-size=20

# Auto-fetch scheduler (cron = every 2 hours)
newsapi.fetch.enabled=true
newsapi.fetch.cron=0 0 */2 * * *
newsapi.fetch.categories=technology,business,health,science,sports,entertainment
newsapi.fetch.language=en
newsapi.fetch.country=us


# ==================== Email / SMTP ====================
# Use Gmail: set MAIL_USERNAME and MAIL_PASSWORD env vars
# For Gmail you need an App Password: myaccount.google.com/apppasswords
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000


app.name=News Digest

# ==================== Notifications ====================
# Weekly digest: every Sunday 8am
notification.weekly-digest.cron=0 0 8 * * SUN


