spring.application.name=News Digest Platform

spring.datasource.url=jdbc:mysql://localhost:3306/news_digest_db
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.pool-name=NewsDigestHikariPool
spring.datasource.hikari.auto-commit=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
# NewsAPI.org ? get free key at https://newsapi.org/register
newsapi.key=${NEWS_API_KEY:0979fb3c999641c59b2532302a8bc1f8}
newsapi.base-url=https://newsapi.org/v2
newsapi.default-page-size=20

# Auto-fetch scheduler (cron = every 2 hours)
newsapi.fetch.enabled=true
newsapi.fetch.cron=0 0 */2 * * *
newsapi.fetch.categories=technology,business,health,science,sports,entertainment
newsapi.fetch.language=en
newsapi.fetch.country=us


